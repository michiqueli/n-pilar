name: Deploy Frontend Instances

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "=== Pulling changes ==="
            cd /var/www/n-pilar/frontends/crislaine && git pull origin main
            cd /var/www/n-pilar/frontends/demo && git pull origin main
            cd /var/www/n-pilar/frontends/skinhairstudio && git pull origin main

            echo "=== Building crislaine ==="
            cd /var/www/n-pilar/frontends/crislaine && npm run build

            echo "=== Building demo ==="
            cd /var/www/n-pilar/frontends/demo && npm run build

            echo "=== Building skinhairstudio ==="
            cd /var/www/n-pilar/frontends/skinhairstudio && npm run build

            echo "=== Deploy complete ==="
